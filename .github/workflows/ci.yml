---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-clean-commits:
    uses: dcm-project/shared-workflows/.github/workflows/check-clean-commits.yaml@main

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install yamllint 'ansible-core>=2.15' ansible-lint

      - name: Install required collections
        run: ansible-galaxy collection install ansible.posix

      - name: YAML lint
        run: yamllint -s .

      - name: Ansible lint
        run: ansible-lint

  syntax-check:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install 'ansible-core>=2.15'

      - name: Install required collections
        run: ansible-galaxy collection install ansible.posix

      - name: Check main playbook syntax
        run: ansible-playbook main.yml --syntax-check

      - name: Check alignment playbook syntax
        run: ansible-playbook verify_compose_alignment.yml --syntax-check

  alignment:
    name: Compose-to-quadlet alignment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install 'ansible-core>=2.15'

      - name: Verify quadlet templates match upstream compose
        run: ansible-playbook verify_compose_alignment.yml

  molecule:
    name: Quadlet template rendering
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install 'ansible-core>=2.15' 'molecule>=26.0.0,<27'

      - name: Install required collections
        run: ansible-galaxy collection install ansible.posix

      - name: Run Molecule tests
        run: molecule test
