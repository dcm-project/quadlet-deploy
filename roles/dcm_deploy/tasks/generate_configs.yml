---
- name: Template DCM environment file
  ansible.builtin.template:
    src: dcm.env.j2
    dest: "{{ dcm_quadlet_dir }}/dcm.env"
    owner: "{{ _dcm_file_owner }}"
    group: "{{ _dcm_file_group }}"
    mode: "0600"
  become: true
  become_user: "{{ _dcm_become_user }}"

- name: Clone control-plane repo, copy config files, and clean up
  block:
    - name: Clone control-plane repository
      ansible.builtin.git:
        repo: "{{ dcm_control_plane_repo }}"
        version: "{{ dcm_control_plane_version }}"
        dest: "{{ dcm_control_plane_clone_dir }}"
        force: true
      become: true
      become_user: "{{ _dcm_become_user }}"

    - name: Copy PostgreSQL init SQL
      ansible.builtin.copy:
        src: "{{ dcm_control_plane_clone_dir }}/deploy/postgres-init/01-create-databases.sql"
        dest: "{{ dcm_config_dir }}/postgres-init/01-create-databases.sql"
        owner: "{{ _dcm_file_owner }}"
        group: "{{ _dcm_file_group }}"
        mode: "0644"
        remote_src: true
      become: true
      become_user: "{{ _dcm_become_user }}"

    - name: Template ACM cluster provider environment file
      ansible.builtin.template:
        src: dcm-acm-cluster.env.j2
        dest: "{{ dcm_quadlet_dir }}/dcm-acm-cluster.env"
        owner: "{{ _dcm_file_owner }}"
        group: "{{ _dcm_file_group }}"
        mode: "0600"
      no_log: true
      when: dcm_provider_acm_cluster
      become: true
      become_user: "{{ _dcm_become_user }}"

  always:
    - name: Remove cloned control-plane repository
      ansible.builtin.file:
        path: "{{ dcm_control_plane_clone_dir }}"
        state: absent
      become: true
      become_user: "{{ _dcm_become_user }}"
