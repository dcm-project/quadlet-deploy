---
- name: Start NATS service
  ansible.builtin.systemd_service:
    name: dcm-nats.service
    state: started
    enabled: true
    scope: "{{ _dcm_systemd_scope }}"
  become: true
  become_user: "{{ _dcm_become_user }}"
  environment: "{{ _dcm_rootless_env }}"

- name: Wait for NATS to be ready
  ansible.builtin.wait_for:
    host: localhost
    port: "{{ dcm_nats_port }}"
    timeout: 60

- name: Start DCM control-plane service
  ansible.builtin.systemd_service:
    name: dcm-control-plane.service
    state: started
    enabled: true
    scope: "{{ _dcm_systemd_scope }}"
  become: true
  become_user: "{{ _dcm_become_user }}"
  environment: "{{ _dcm_rootless_env }}"

- name: Wait for control-plane container to be healthy
  ansible.builtin.command: podman inspect --format {% raw %}'{{.State.Health.Status}}'{% endraw %} control-plane
  become: true
  become_user: "{{ _dcm_become_user }}"
  environment: "{{ _dcm_rootless_env }}"
  register: control_plane_health
  until: control_plane_health.stdout | trim == "healthy"
  retries: 30
  delay: 2
  changed_when: false

- name: Start DCM UI service
  ansible.builtin.systemd_service:
    name: dcm-ui.service
    state: started
    enabled: true
    scope: "{{ _dcm_systemd_scope }}"
  become: true
  become_user: "{{ _dcm_become_user }}"
  environment: "{{ _dcm_rootless_env }}"

- name: Start KubeVirt service provider
  ansible.builtin.systemd_service:
    name: dcm-kubevirt-service-provider.service
    state: started
    enabled: true
    scope: "{{ _dcm_systemd_scope }}"
  become: true
  become_user: "{{ _dcm_become_user }}"
  environment: "{{ _dcm_rootless_env }}"
  when: dcm_provider_kubevirt

- name: Start K8s container service provider
  ansible.builtin.systemd_service:
    name: dcm-k8s-container-service-provider.service
    state: started
    enabled: true
    scope: "{{ _dcm_systemd_scope }}"
  become: true
  become_user: "{{ _dcm_become_user }}"
  environment: "{{ _dcm_rootless_env }}"
  when: dcm_provider_k8s_container

- name: Start ACM cluster service provider
  ansible.builtin.systemd_service:
    name: dcm-acm-cluster-service-provider.service
    state: started
    enabled: true
    scope: "{{ _dcm_systemd_scope }}"
  become: true
  become_user: "{{ _dcm_become_user }}"
  environment: "{{ _dcm_rootless_env }}"
  when: dcm_provider_acm_cluster

- name: Start three-tier demo service provider
  ansible.builtin.systemd_service:
    name: dcm-three-tier-demo-service-provider.service
    state: started
    enabled: true
    scope: "{{ _dcm_systemd_scope }}"
  become: true
  become_user: "{{ _dcm_become_user }}"
  environment: "{{ _dcm_rootless_env }}"
  when: dcm_provider_three_tier_demo
