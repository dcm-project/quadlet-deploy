---
- name: Verify rendered quadlet files (rootless)
  hosts: all
  gather_facts: false
  vars:
    quadlet_dir: /tmp/molecule-dcm-rootless/.config/containers/systemd
    core_containers:
      - dcm-postgres.container
      - dcm-nats.container
      - dcm-control-plane.container
      - dcm-ui.container
    network_files:
      - dcm-network.network
    volume_files:
      - dcm-postgres-data.volume
      - dcm-nats-data.volume
    # Containers that use EnvironmentFile for shared env vars
    env_file_containers:
      - dcm-postgres.container
      - dcm-control-plane.container
  tasks:
    # --- File existence ---
    - name: Stat core container files
      ansible.builtin.stat:
        path: "{{ quadlet_dir }}/{{ item }}"
      register: core_stat
      loop: "{{ core_containers }}"

    - name: Assert core container files exist
      ansible.builtin.assert:
        that: item.stat.exists
        fail_msg: "Missing core template: {{ item.item }}"
      loop: "{{ core_stat.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Stat network file
      ansible.builtin.stat:
        path: "{{ quadlet_dir }}/{{ item }}"
      register: network_stat
      loop: "{{ network_files }}"

    - name: Assert network file exists
      ansible.builtin.assert:
        that: item.stat.exists
        fail_msg: "Missing network file: {{ item.item }}"
      loop: "{{ network_stat.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Stat volume files
      ansible.builtin.stat:
        path: "{{ quadlet_dir }}/{{ item }}"
      register: volume_stat
      loop: "{{ volume_files }}"

    - name: Assert volume files exist
      ansible.builtin.assert:
        that: item.stat.exists
        fail_msg: "Missing volume file: {{ item.item }}"
      loop: "{{ volume_stat.results }}"
      loop_control:
        label: "{{ item.item }}"

    # --- Read all core container files for content assertions ---
    - name: Slurp core container files
      ansible.builtin.slurp:
        src: "{{ quadlet_dir }}/{{ item }}"
      register: core_slurp
      loop: "{{ core_containers }}"

    # --- WantedBy matches rootless mode (default.target) ---
    - name: Assert WantedBy=default.target in core containers
      ansible.builtin.assert:
        that: >-
          'WantedBy=default.target' in (item.content | b64decode)
        fail_msg: "{{ item.item }} should have WantedBy=default.target in rootless mode"
      loop: "{{ core_slurp.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Slurp network file
      ansible.builtin.slurp:
        src: "{{ quadlet_dir }}/{{ item }}"
      register: network_slurp
      loop: "{{ network_files }}"

    - name: Assert WantedBy=default.target in network file
      ansible.builtin.assert:
        that: >-
          'WantedBy=default.target' in (item.content | b64decode)
        fail_msg: "{{ item.item }} should have WantedBy=default.target in rootless mode"
      loop: "{{ network_slurp.results }}"
      loop_control:
        label: "{{ item.item }}"

    # --- No hardcoded rootful paths in rendered templates ---
    - name: Assert no hardcoded rootful paths
      ansible.builtin.assert:
        that:
          - "'/etc/containers/systemd' not in (item.content | b64decode)"
          - "'/srv/containers/dcm' not in (item.content | b64decode)"
        fail_msg: "{{ item.item }} contains hardcoded rootful paths"
      loop: "{{ core_slurp.results }}"
      loop_control:
        label: "{{ item.item }}"

    # --- EnvironmentFile points to rootless quadlet dir ---
    - name: Assert EnvironmentFile points to rootless quadlet dir
      ansible.builtin.assert:
        that: >-
          (item.content | b64decode) is regex('EnvironmentFile=.*/\.config/containers/systemd/dcm\.env')
        fail_msg: "{{ item.item }} EnvironmentFile should reference rootless quadlet dir"
      loop: "{{ core_slurp.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: item.item in env_file_containers

    # --- All containers use Network=dcm-network.network ---
    - name: Assert all core containers use dcm-network.network
      ansible.builtin.assert:
        that: >-
          'Network=dcm-network.network' in (item.content | b64decode)
        fail_msg: "{{ item.item }} is missing Network=dcm-network.network"
      loop: "{{ core_slurp.results }}"
      loop_control:
        label: "{{ item.item }}"
