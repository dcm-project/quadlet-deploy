---
- name: "Run Role"
  hosts: all
  become: true
  gather_facts: true

  tasks:

    - name: "Load vault variables from file"
      when: vault_path is defined
      ansible.builtin.include_vars:
        file: "{{ vault_path }}"

    - name: "Load extra variables from file"
      when: vars_path is defined
      ansible.builtin.include_vars:
        file: "{{ vars_path }}"

    - name: "Load vault variables from directory"
      when: vault_dir is defined
      ansible.builtin.include_vars:
        dir: "{{ vault_dir }}"

    - name: "Load extra variables from directory"
      when: vars_dir is defined
      ansible.builtin.include_vars:
        dir: "{{ vars_dir }}"

    - name: "Apply role {{ role_name }}"
      ansible.builtin.include_role:
        name: "{{ role_name }}"
